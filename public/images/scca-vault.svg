<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="vaultBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="vaultGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#vaultBg)" rx="12"/>
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  
  <!-- Rotating Elements -->
  <g transform="translate(200, 200)">
    <!-- Outer gear teeth -->
    <g stroke="#10b981" stroke-width="3" fill="none" opacity="0.4">
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(0)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(30)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(60)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(90)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(120)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(150)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(180)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(210)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(240)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(270)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(300)"/>
      <line x1="0" y1="-155" x2="0" y2="-145" transform="rotate(330)"/>
    </g>
  </g>
  
  <!-- Main Vault Door -->
  <circle cx="200" cy="200" r="120" fill="#064e3b" stroke="#10b981" stroke-width="3" filter="url(#vaultGlow)"/>
  <circle cx="200" cy="200" r="110" fill="#0a0a0a" stroke="#10b981" stroke-width="1"/>
  
  <!-- Vault Bolts -->
  <g fill="#10b981">
    <circle cx="200" cy="95" r="8"/>
    <circle cx="200" cy="305" r="8"/>
    <circle cx="95" cy="200" r="8"/>
    <circle cx="305" cy="200" r="8"/>
    <circle cx="125" cy="125" r="6"/>
    <circle cx="275" cy="125" r="6"/>
    <circle cx="125" cy="275" r="6"/>
    <circle cx="275" cy="275" r="6"/>
  </g>
  
  <!-- Combination Lock Rings -->
  <circle cx="200" cy="200" r="70" fill="none" stroke="#10b981" stroke-width="2"/>
  <circle cx="200" cy="200" r="55" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="#10b981" stroke-width="2"/>
  
  <!-- Lock Numbers -->
  <g fill="#10b981" font-family="monospace" font-size="8" text-anchor="middle">
    <text x="200" y="145">0</text>
    <text x="245" y="155">15</text>
    <text x="255" y="200">30</text>
    <text x="245" y="245">45</text>
    <text x="200" y="265">60</text>
    <text x="155" y="245">75</text>
    <text x="145" y="200">90</text>
    <text x="155" y="155">00</text>
  </g>
  
  <!-- Center Lock -->
  <circle cx="200" cy="200" r="25" fill="#10b981"/>
  <circle cx="200" cy="200" r="18" fill="#0a0a0a"/>
  <rect x="195" y="188" width="10" height="15" fill="#10b981"/>
  <path d="M192 188 L192 182 Q200 175 208 182 L208 188" fill="none" stroke="#10b981" stroke-width="3"/>
  
  <!-- Keyhole -->
  <circle cx="200" cy="205" r="4" fill="#10b981"/>
  
  <!-- Side Panels -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="30" height="40" rx="3" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
    <line x1="5" y1="10" x2="25" y2="10" stroke="#10b981" stroke-width="1"/>
    <line x1="5" y1="20" x2="25" y2="20" stroke="#10b981" stroke-width="1"/>
    <line x1="5" y1="30" x2="25" y2="30" stroke="#10b981" stroke-width="1"/>
  </g>
  
  <g transform="translate(330, 180)">
    <rect x="0" y="0" width="30" height="40" rx="3" fill="#1f2937" stroke="#10b981" stroke-width="1"/>
    <line x1="5" y1="10" x2="25" y2="10" stroke="#10b981" stroke-width="1"/>
    <line x1="5" y1="20" x2="25" y2="20" stroke="#10b981" stroke-width="1"/>
    <line x1="5" y1="30" x2="25" y2="30" stroke="#10b981" stroke-width="1"/>
  </g>
  
  <!-- Bottom Label -->
  <text x="200" y="370" fill="#10b981" font-family="monospace" font-size="12" 
        text-anchor="middle" letter-spacing="3">VAULT API</text>
  
  <!-- Corner Accents -->
  <g stroke="#10b981" stroke-width="1" opacity="0.3">
    <path d="M15 15 L40 15 L40 25"/>
    <path d="M385 15 L360 15 L360 25"/>
    <path d="M15 385 L40 385 L40 375"/>
    <path d="M385 385 L360 385 L360 375"/>
  </g>
</svg>