<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <defs>
    <linearGradient id="binBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="350" fill="url(#binBg)" rx="8"/>
  
  <!-- Title -->
  <text x="300" y="35" fill="#10b981" font-family="monospace" font-size="14" 
        font-weight="bold" text-anchor="middle">BINARY MESSAGE FORMAT</text>
  
  <!-- Header Box -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="500" height="50" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="250" y="20" fill="#10b981" font-family="monospace" font-size="11" 
          text-anchor="middle" font-weight="bold">Header (10 bytes)</text>
    <text x="250" y="40" fill="#6b7280" font-family="monospace" font-size="9" 
          text-anchor="middle">[version:1][role:1][sequence:2][timestamp:4][flags:2]</text>
    
    <!-- Byte markers -->
    <g stroke="#10b981" stroke-width="0.5" opacity="0.3">
      <line x1="50" y1="0" x2="50" y2="50"/>
      <line x1="100" y1="0" x2="100" y2="50"/>
      <line x1="150" y1="0" x2="150" y2="50"/>
      <line x1="200" y1="0" x2="200" y2="50"/>
      <line x1="250" y1="0" x2="250" y2="50"/>
      <line x1="300" y1="0" x2="300" y2="50"/>
      <line x1="350" y1="0" x2="350" y2="50"/>
      <line x1="400" y1="0" x2="400" y2="50"/>
      <line x1="450" y1="0" x2="450" y2="50"/>
    </g>
  </g>
  
  <!-- Arrow -->
  <line x1="300" y1="120" x2="300" y2="140" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="295,135 300,145 305,135" fill="#10b981"/>
  
  <!-- Nonce Box -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="300" height="40" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="150" y="16" fill="#10b981" font-family="monospace" font-size="10" 
          text-anchor="middle" font-weight="bold">Nonce (12 bytes)</text>
    <text x="150" y="32" fill="#6b7280" font-family="monospace" font-size="8" 
          text-anchor="middle">Random 12-byte value, never reused</text>
  </g>
  
  <!-- Arrow -->
  <line x1="300" y1="200" x2="300" y2="220" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="295,215 300,225 305,215" fill="#10b981"/>
  
  <!-- Ciphertext Box -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="500" height="45" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="250" y="18" fill="#10b981" font-family="monospace" font-size="10" 
          text-anchor="middle" font-weight="bold">Ciphertext (variable)</text>
    <text x="250" y="36" fill="#6b7280" font-family="monospace" font-size="8" 
          text-anchor="middle">AES-256-GCM(key, nonce, zlib.deflate(content))</text>
  </g>
  
  <!-- Arrow -->
  <line x1="300" y1="285" x2="300" y2="305" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="295,300 300,310 305,300" fill="#10b981"/>
  
  <!-- Auth Tag Box -->
  <g transform="translate(200, 315)">
    <rect x="0" y="0" width="200" height="25" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="17" fill="#10b981" font-family="monospace" font-size="9" 
          text-anchor="middle">Auth Tag (16 bytes) — GCM authentication</text>
  </g>
  
  <!-- Size Labels -->
  <text x="30" y="85" fill="#6b7280" font-family="monospace" font-size="8" text-anchor="end">10B</text>
  <text x="130" y="170" fill="#6b7280" font-family="monospace" font-size="8" text-anchor="end">12B</text>
  <text x="30" y="252" fill="#6b7280" font-family="monospace" font-size="8" text-anchor="end">var</text>
  <text x="180" y="330" fill="#6b7280" font-family="monospace" font-size="8" text-anchor="end">16B</text>
  
  <!-- Corner Decorations -->
  <g stroke="#10b981" stroke-width="1" opacity="0.2">
    <path d="M10 10 L25 10 L25 20"/>
    <path d="M590 10 L575 10 L575 20"/>
    <path d="M10 340 L25 340 L25 330"/>
    <path d="M590 340 L575 340 L575 330"/>
  </g>
</svg>