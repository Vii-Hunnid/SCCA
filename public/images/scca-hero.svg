<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="mintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Grid Pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)" rx="12"/>
  
  <!-- Central Shield Icon -->
  <g transform="translate(350, 180)" filter="url(#glow)">
    <!-- Outer Glow -->
    <path d="M50 0 L100 25 L100 65 Q100 95 50 120 Q0 95 0 65 L0 25 Z" 
          fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
    <!-- Shield Outline -->
    <path d="M50 10 L90 30 L90 65 Q90 88 50 108 Q10 88 10 65 L10 30 Z" 
          fill="#064e3b" stroke="#10b981" stroke-width="3"/>
    <!-- Lock Icon Inside -->
    <rect x="35" y="50" width="30" height="25" rx="3" fill="#10b981"/>
    <path d="M40 50 L40 42 Q40 35 50 35 Q60 35 60 42 L60 50" 
          fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="62" r="4" fill="#064e3b"/>
  </g>
  
  <!-- Binary/Data Streams -->
  <g opacity="0.6">
    <!-- Left Stream -->
    <text x="50" y="100" fill="#10b981" font-family="monospace" font-size="12" opacity="0.4">01001000</text>
    <text x="50" y="125" fill="#10b981" font-family="monospace" font-size="12" opacity="0.6">11010110</text>
    <text x="50" y="150" fill="#10b981" font-family="monospace" font-size="12" opacity="0.8">00101101</text>
    <text x="50" y="175" fill="#10b981" font-family="monospace" font-size="12">10111010</text>
    
    <!-- Right Stream -->
    <text x="680" y="100" fill="#10b981" font-family="monospace" font-size="12" opacity="0.4">10110111</text>
    <text x="680" y="125" fill="#10b981" font-family="monospace" font-size="12" opacity="0.6">01001001</text>
    <text x="680" y="150" fill="#10b981" font-family="monospace" font-size="12" opacity="0.8">11100010</text>
    <text x="680" y="175" fill="#10b981" font-family="monospace" font-size="12">00011101</text>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Left connections to shield -->
    <path d="M120 150 Q250 150 340 220" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M120 350 Q250 350 340 280" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="10;0" dur="1s" repeatCount="indefinite"/>
    </path>
    
    <!-- Right connections from shield -->
    <path d="M460 220 Q550 150 680 150" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;10" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M460 280 Q550 350 680 350" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="10;0" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Key Icons -->
  <g transform="translate(80, 320)">
    <circle cx="20" cy="20" r="25" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <path d="M15 20 Q15 12 20 12 Q25 12 25 20 L25 25 L28 25 L28 28 L25 28 L25 32 L28 32 L28 35 L22 35 L22 20" 
          fill="#10b981"/>
  </g>
  
  <g transform="translate(680, 320)">
    <circle cx="20" cy="20" r="25" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <path d="M15 20 Q15 12 20 12 Q25 12 25 20 L25 25 L28 25 L28 28 L25 28 L25 32 L28 32 L28 35 L22 35 L22 20" 
          fill="#10b981"/>
  </g>
  
  <!-- Bottom Data Nodes -->
  <g transform="translate(200, 400)">
    <rect x="0" y="0" width="60" height="35" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
    <text x="30" y="22" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle">AES-256</text>
  </g>
  
  <g transform="translate(370, 400)">
    <rect x="0" y="0" width="60" height="35" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
    <text x="30" y="22" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle">HKDF</text>
  </g>
  
  <g transform="translate(540, 400)">
    <rect x="0" y="0" width="60" height="35" rx="4" fill="#1f2937" stroke="#10b981" stroke-width="1.5"/>
    <text x="30" y="22" fill="#10b981" font-family="monospace" font-size="10" text-anchor="middle">MERKLE</text>
  </g>
  
  <!-- Decorative Corner Elements -->
  <g stroke="#10b981" stroke-width="1" opacity="0.3">
    <path d="M20 20 L50 20 L50 30"/>
    <path d="M780 20 L750 20 L750 30"/>
    <path d="M20 480 L50 480 L50 470"/>
    <path d="M780 480 L750 480 L750 470"/>
  </g>
  
  <!-- Title Text -->
  <text x="400" y="60" fill="#10b981" font-family="system-ui, sans-serif" font-size="24" 
        font-weight="bold" text-anchor="middle" letter-spacing="4">SCCA</text>
  <text x="400" y="85" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12" 
        text-anchor="middle" letter-spacing="2">SECURE COMPACT CHAT ARCHITECTURE</text>
</svg>