<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="400" fill="url(#archBg)" rx="8"/>
  
  <!-- Title -->
  <text x="350" y="35" fill="#10b981" font-family="monospace" font-size="14" 
        font-weight="bold" text-anchor="middle">KEY HIERARCHY</text>
  
  <!-- Master Key Box -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="200" height="45" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="20" fill="#10b981" font-family="monospace" font-size="11" 
          text-anchor="middle" font-weight="bold">MASTER_KEY_SECRET</text>
    <text x="100" y="36" fill="#6b7280" font-family="monospace" font-size="9" 
          text-anchor="middle">32 bytes, environment variable</text>
  </g>
  
  <!-- Arrow Down -->
  <line x1="350" y1="115" x2="350" y2="135" stroke="#10b981" stroke-width="1.5" 
        marker-end="url(#arrowhead)"/>
  <text x="360" y="128" fill="#6b7280" font-family="monospace" font-size="8">HKDF</text>
  
  <!-- User Key Box -->
  <g transform="translate(250, 145)">
    <rect x="0" y="0" width="200" height="45" rx="6" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="100" y="20" fill="#10b981" font-family="monospace" font-size="11" 
          text-anchor="middle" font-weight="bold">User Key</text>
    <text x="100" y="36" fill="#6b7280" font-family="monospace" font-size="9" 
          text-anchor="middle">HKDF("user-key", masterKey, userSalt)</text>
  </g>
  
  <!-- Branch Arrows -->
  <line x1="350" y1="200" x2="350" y2="215" stroke="#10b981" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="500" y2="215" stroke="#10b981" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="200" y2="235" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="215" x2="500" y2="235" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Conversation Key Box -->
  <g transform="translate(90, 245)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="110" y="18" fill="#10b981" font-family="monospace" font-size="10" 
          text-anchor="middle" font-weight="bold">Conversation Key</text>
    <text x="110" y="32" fill="#6b7280" font-family="monospace" font-size="8" 
          text-anchor="middle">HKDF("conv-key", userKey, conversationId)</text>
    <text x="110" y="44" fill="#059669" font-family="monospace" font-size="8" 
          text-anchor="middle">AES-256-GCM encrypt/decrypt</text>
  </g>
  
  <!-- Integrity Key Box -->
  <g transform="translate(390, 245)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="110" y="18" fill="#10b981" font-family="monospace" font-size="10" 
          text-anchor="middle" font-weight="bold">Integrity Key</text>
    <text x="110" y="32" fill="#6b7280" font-family="monospace" font-size="8" 
          text-anchor="middle">HKDF("integrity", userKey, conversationId)</text>
    <text x="110" y="44" fill="#059669" font-family="monospace" font-size="8" 
          text-anchor="middle">Merkle-HMAC chain</text>
  </g>
  
  <!-- Bottom Note -->
  <g transform="translate(150, 340)">
    <rect x="0" y="0" width="400" height="35" rx="4" fill="#064e3b" stroke="#10b981" stroke-width="1" opacity="0.3"/>
    <text x="200" y="22" fill="#10b981" font-family="monospace" font-size="10" 
          text-anchor="middle">Keys derived on-demand, never stored</text>
  </g>
  
  <!-- Side Decorations -->
  <g stroke="#10b981" stroke-width="1" opacity="0.2">
    <circle cx="30" cy="200" r="15" fill="none"/>
    <circle cx="670" cy="200" r="15" fill="none"/>
    <line x1="30" y1="185" x2="30" y2="215"/>
    <line x1="15" y1="200" x2="45" y2="200"/>
    <line x1="670" y1="185" x2="670" y2="215"/>
    <line x1="655" y1="200" x2="685" y2="200"/>
  </g>
</svg>